body:
  text: 三藏法師善無畏集譯次除遣從魔法者有毘那夜迦逐諸尊請尊至已即用枳里枳里真言及手印而除遣之真言曰唵枳里枳里嚩日囉二合𤙖泮吒誦七遍其手印相以右手大指捻小指甲直竪三指作拔折羅形向外託之將此枳里枳里金剛真言及手印而用除遣之次視三昧耶者作除遣已于時即以右手視印誦此真言令住真言曰唵昇羯𭋺三摩焰􅁥莎訶誦七遍其手印相以右手大指捻小指甲竪三指作拔折囉形向外託之三昧耶印奉座令坐者先奉閼伽然後請坐其閼伽器以本真言持誦而獻或以通用閼伽真言持誦隨其成就事部差別執閼伽器當置額心等乃至於膝而奉獻之真言曰唵藥乞衫囊那也見引捺囉達弩鉢哩二合也鉢捨去鉢捨􅁥莎訶誦三遍通用持誦閼伽真言其手印相以護身印改其母指置於頭指側奉閼伽印於晨朝時日中時及日暮時於此三時以其真言手印奉蓮華座供養本尊初佛部奉座真言曰唵味囉味囉引野􅁥莎訶蓮華部奉座真言曰唵鉢那莽二合味囉引也􅁥莎訶金剛部奉座真言曰唵嚩日囉味囉引也􅁥莎訶其手印相二手合掌頭指中指無名指並相博著開掌中相去四指許其二大指及二小指並相著直竪此印通三部用奉獻蓮華座印次言善來世尊由本願力而來降赴願垂加持受斯所請并受我所辦諸供養起大慈悲唯垂納受取辟除隨逐本尊毘那夜迦及三昧耶此下安之若辦衣裳瓔珞等物以辦事真言持誦奉獻其結界法者以金剛𣐍法用結地界以金剛牆用結上方界金剛𣐍真言曰唵枳里枳里嚩日囉拔折哩部囉二合滿馱滿馱𤙖泮吒誦三遍其手印相以左手中指無名指向外雙入右手中指無名指間以左手無名指絞右手無名指背入右手掌中以左手中指絞右手中指背入右手掌中二小指及二頭指相著二大母指直竪頭相著以此印翼兩臂令二大指頭著地而誦真言成結地界金剛𣐍印次以金剛鉤欄真言及手印用結上方界真言曰唵微娑普羅二合那羅二合乞沙二合嚩日囉二合半若而也反囉𤙖泮吒誦三遍其手印相依前𣐍印唯改二大指博著二頭指側舉印向上而誦真言成結空界是金剛鉤欄牆印金剛牆真言手印金剛牆真言曰唵薩囉薩囉嚩日囉二合鉢囉二合迦囉𤙖泮吒其手印相依前𣐍印唯改二大指開散直竪以印從南右轉三遍及誦真言成就金剛牆印是金剛爐印次以金剛羂索真言手印結東方界真言曰唵跛折囉波舍二合紇里伽伽那摩囉𤙖誦三遍其手印相以左手頭指屈著大指根下以大母指直竪押頭指甲微開圓孔餘三指相博直竪右手亦然以右手三指背著左手三指內是金剛羂索印次以金剛幡真言及手印結西方界真言曰唵鉢鐙祗寧囉吒誦三遍其手印相以左手作拳直竪大指舒右手五指側置左手大指頭上掌向身結西方界金剛幡印拳右手如左亦是此印次以金剛迦利真言手印結北方界真言曰唵嚩日囉迦里囉吒莽吒誦三遍其手印相以二手大指二小指令頭相著餘指各自屈向掌中勿令指背相著亦勿著掌結北方界是金剛迦里印次以金剛峯真言及印結南方界真言曰唵嚩日囉尸佉囉嚕吒莽吒誦三遍其手印相以左手作拳直竪大指右手亦然置其左手大指頭上令其右手大指頭指相捻又依此印結南方界唯改右手中指以下三指直舒亦名峯印結南方界是金剛峯印次用真言持誦右手掌七遍以指其地成結下方界以印仰手拍其上方亦成結上界真言曰唵商羯㘑三莽焰􅁥莎訶誦七遍次以阿三忙祇寧真言及手印普作火院真言曰唵阿三𥌋引祇寧賀唎𤙖泮吒誦三遍其手印相以右手指背置左手指內令無縫罅二大指向上直竪右轉一遍即成火院是阿三忙祇寧印次以真言及手印重結大界真言曰唵昇二合羯𭋺莽訶三莽焰􅁥莎訶誦七遍是三重界內結大界真言其手印相以二手小指無名指相叉入掌直竪二中指頭相著二頭指屈在中指背上節勿著中指如三股杵二大指在頭指側普轉八方上下及誦真言成結大界是結大界印如是作已假使側近輪王佛頂及餘相違諸真言者不能為壞亦不損減本尊威力諸有破明真言繼縛及却著法皆不得便次備縛日囉等者謂金剛數珠指環腰線臂釧蓮華標旗等物以香水淨或餘物淨用本尊真言而持誦之於念誦時及護摩時皆須具備如上等物次說成就拔折囉等諸餘物法其拔折囉隨其相應置於器中當自面前安置坐上以白檀欝金紫檀香各隨部類而用塗之次以香華等執持供養請金剛等真言之主以彼真言持誦香華而用供養又誦千遍即名成就是拔折囉真言曰唵度囊嚩日囉訶成就嚩日囉真言其拔折囉以紫檀等三股而作持誦千遍次說佛部淨數珠真言曰那謨羅􅑈怛囊怛囉夜也唵閼娜薄二合帝微若曳悉地悉馱引􅛂㗚替二合􅁥莎訶次說蓮華部淨數珠真言曰那謨鉢特莽簛拏曳唵闇沒哩耽儼袂室里二合曳室唎二合忙里儞􅁥莎訶次說金剛部淨數珠真言曰那謨羅􅑈怛囊二合怛羅二合夜也那莽室戰二合拏嚩日囉二合簸儜曳摩訶藥乞沙二合細囊鉢跢曳唵枳里枳里勞捺哩二合尼􅁥莎訶各以此三部淨數珠真言隨其本部真言用穿珠孔一一珠顆持誦七遍乃至穿繼畢已又更持誦真言百遍復如前法而淨數珠後以此真言而作成就初說佛部成就數珠真言曰唵那謨婆伽嚩底蘇悉悌娑馱也悉馱􅚼㗚替􅁥莎訶次說蓮華部成就數珠真言曰唵縛蘇莽底室哩二合曳鉢特莽二合忙里儞􅁥莎訶金剛部成就數珠真言曰唵嚩日囉爾耽若曳􅁥莎訶以此成就數珠真言請本部真言於數珠上乃至供養持誦千遍以為成就次說執持數珠手印之相以右手大指捻無名指頭直舒中指小指微屈頭指著中指上節側是手印通三部用是佛部數珠印次說蓮華部執數珠印相以右手大指捻其中指頭餘三指直舒左手亦然次說金剛部執數珠印相以右手作拳展大指捻頭指左手亦然以活兒子於佛部為數珠以蓮華子觀音部為數珠以嚕捺囉叉子金剛部為數珠又說取活兒子蓮華子嚕捺囉叉子商佉及石木患金銀鐵鉛錫熟銅琉璃隨取其一數過百量而作數珠以右手執心不散亂真言誦畢一時當掐勿令前後次說臂釧之法其臂釧中穿一活兒子等珠以部母真言手印持誦香華而用供養及香水灑還以此部母真言手印請來加持釧上復以部母真言印次第供養乃至持誦千遍以捺婆草作環置無名指用部心真言如前作法成就乃至持誦千遍各依本部次第應知其腰線法令童女搓合以俱遜婆染此云紅藍華或欝金染如前作法成就乃至持誦千遍於念誦時護摩時及以睡時繼於腰間能止失精成就腰線真言曰唵訶羅訶羅滿馱滿馱儞束訖囉馱囉尼悉馱重引􅚼㗚替二合􅁥莎訶去聲通三部用其印與部母印同於佛部中其線白色蓮華部中其線黃色金剛部中其線赤色此等物備具在身方可作法依經依部如經所說結大界已次應供養隨其成就及事部別所辦塗香色味香氣與彼相應前所說去垢乃至光澤塗香以此真言及本部真言持誦加護復作手印而奉獻之奉塗香真言曰伊咩言馱輸婆儞微夜輸者也輸者瑜那也莽夜儞吠儞妬薄訖底夜二合鉢羅二合底仡㗚二合呬也二合鉢羅二合四挪咩唵阿去賀羅阿賀羅薩􅞣囉縛尾儞夜二合達囉布爾帝􅁥莎訶七遍通三部用其手印相以右手舒五指竪掌向外以左手向上把右手腕四指向外大指在內把之是奉塗香手印通三部用又佛部奉塗香真言唵阿仡路􅑈多羅仡囉微灑曳囊莽􅁥莎訶誦七遍蓮華部奉塗香真言曰唵那㗚二合知那㗚知那㗚二合吒鉢寧上那㗚二合帝夜那㗚二合底夜鉢寧上𤙖泮吒誦七遍金剛部奉塗香真言曰唵微薩囉微薩囉𤙖泮吒誦七遍次前所說去垢乃至光澤華以此真言及本真言持誦復作手印而奉獻之奉華真言曰伊咩蘇莽囊素儞尾夜輸者也輸者瑜囊也莽囊夜寧吠儞多薄訖底夜二合鉢羅底仡㗚二合呬也二合鉢囉四挪咩唵阿賀羅阿賀囉薩􅞣羅嚩尾儞夜二合達囉布爾帝􅁥莎訶誦七遍奉華真言通三部其手印相如前車輅印唯改二大指博二頭指側是奉華印通三部用又佛部奉華真言曰唵尸祇尸契􅁥莎訶誦七遍蓮華部奉華真言曰唵戰尼寧健陀謨丁泥𤙖泮吒誦七遍金剛部奉華真言曰唵部哩若嚩二合蘭多詣􅁥莎訶誦七遍次前所說去垢乃至光澤燒香以此真言及本真言持誦復作手印而奉獻之奉燒香真言曰阿閻嚩囊裟鉢二合底囉素賀㗚二合儞也好心健陀值也鬱香蘇囉部若天食囊莽夜寧吠儞妬虔誠奉獻薄訖底夜三合度報閻鉢囉底仡㗚呬也難願納受唵阿賀羅阿賀羅薩􅞣囉嚩二合尾儞夜二合達羅布爾帝􅁥莎訶誦七遍通三部用其手印相以二手小指無名指中指並向內背相著向上直竪二頭指側相向去一麥道不相著二大指博著二頭指側是奉燒香印通三部佛部奉燒香真言曰那謨仡羅二合蔓拏微灑曳尸棄寧􅁥莎訶誦七遍蓮華部奉燒香真言曰唵戰捺囉婆蔓拏里伽㗚那祇里尼吽泮吒誦七遍金剛部奉燒香真言曰唵微薩羅微薩羅吽泮吒誦七遍次前所說去垢乃至光澤飲食以此真言及本真言持誦復作手印而奉獻之奉食真言曰奧灑悌難諸藥汁囉素賀㗚儞也二合心歡喜曀灑滿多囉二合設怒麼里此等尊食莽也寧吠儞妬至誠奉獻薄訖底夜二合鉢囉底訖㗚二合呬也二合鉢羅二合四挪咩唵阿賀羅阿賀羅薩􅞣囉嚩二合尾儞夜達囉布爾帝􅁥莎訶誦七遍通三部用其手印相仰兩手掌向上側相著二無名指頭側相著微屈二頭指博著中指側二大指博著二頭指側小似掬水相是奉食印通三部用又佛部奉食真言曰唵掣挪弭二合尼上􅁥莎訶誦七遍蓮華部奉食真言曰唵微路緊寧􅁥莎訶誦七遍金剛部奉食真言曰唵嚩日哩尼上嚩日藍藝􅁥莎訶誦七遍次前說去垢乃至光澤然燈以此真言及本真言持誦復作手印而奉獻之奉然燈真言曰囉訖芻􅍕近囊二合灑者二合護身清淨能去無明此等虔誠奉獻跛尾怛囉二合室者二合膽謨尾曇莽囊輸婆莽夜寧吠儞妬薄訖底夜三合儞去報閻鉢囉二合底仡㗚二合呬也二合難唵阿去路迦也阿略迦也薩􅞣囉嚩二合尾儞夜二合達囉布爾帝􅁥莎訶誦七遍三部用其手印相以右手作拳舒中指大指頭相捻直竪此是奉然燈印通三部用又佛部奉燈真言曰唵阿莽羅劍底帝爾寧􅁥莎訶誦三遍蓮花部奉燈真言曰唵戰安尼二合上聲寧上聲茹瑳囊二合羯哩𤙖泮吒七遍金剛部奉燈真言曰唵尾嚩㗚二合多路者囊上𤙖泮吒七遍次真言并及手印運心供養者若當不辦塗香乃至燈明供養但誦如上奉塗香等真言及作手印亦成圓滿供養次運心供養者以心運想水陸諸華無主所攝遍滿虛空盡十方界及以人天妙塗香雲燒香燈明幢旛寶繖蓋種種鼓樂歌舞妓唱真珠羅網懸諸寶鈴華鬘白拂微妙磬鐸矜羯尼網如意寶樹衣服之雲天諸厨膳上妙香美宮殿樓閣寶柱莊嚴天諸嚴身頭冠瓔珞如是等雲行者運心遍滿虛空以至誠心如是供養最為勝上是故行者以決定心而行此法運心供養誦持真言及作手印如上所想皆悉成就真言曰唵薩􅞣囉嚩他龕榾那蘗帝娑頗囉呬門伽伽囊劍􅁥莎訶誦七遍其手印相兩手相叉合掌以右押左置於頂上此是成就運心供養具手印凡作供養應具此法至誠信心及奉閼伽皆以真言手印持誦成就及以運心合掌置頂方成圓滿供養之法次讚歎法者先發信心至誠慇重讚歎佛德次法及僧次觀自在金剛菩薩等歎佛功德者大悲護世尊導師備眾藝無邊功德海我今頭面禮次歎法德者離欲清淨法能除諸惡趣真寂第一義稽首依法住次歎僧德者善獲解脫道妙住諸覺地無等良福田我今歸命是次歎觀自在諸佛大吉祥圓備於尊德號名觀自在歸依常寂默次歎執金剛大力奇忿怒成就大明王調伏難降者歸命執金剛先所歸命諸大菩薩如欲讚歎隨意依經而讚歎之及餘本尊時欲讚者亦應讚歎次懺悔諸罪次隨喜諸福次應請召復勸請常住在世利樂有情次歸命三寶次發菩提心次當發願初懺悔者唯願十方一切諸佛諸大菩薩羅漢聖僧當存念我當證知我若我此世若我前生從無始生死已來從貪嗔癡一切煩惱惱亂身心廣造眾罪於佛法僧父母師長及諸菩薩一切聖人及餘眾生有德無德放縱三業造種種罪自他教他見作隨喜如是等罪無量無邊於諸佛菩薩前誠心發露慇重懺悔一懺已後更不復造唯願十方一切諸佛諸大菩薩慈悲證知罪障銷滅歸命三寶者為除眾生種種苦故應當如是歸依三寶思念三寶一一恩德以頭頂著地如是歸依作如是言我某甲願從今身乃至當坐菩提道場歸依如來無上三身歸依方廣大乘法藏歸依一切不退菩薩僧唯願十方一切諸佛諸大菩薩慈悲攝受應當如是歸依三寶發菩提心者此菩提心名為無上大乘種子能與眾生甘露解脫妙果故慇重進修能生悉地為欲斷除眾生界中無量諸苦免煩惱染越三惡道三有受身無量等苦我今為作覆護之處無主無依我為依處度生死海我為船師失路之人我為善道無救護者我為救之除苦與樂一切眾生所有煩惱及隨煩惱我當為除滅常思善業不念惡緣種種功德智慧嚴身六波羅密勤修不間饒益眾生同修是福若我此生若於余生所修福智饒益眾生所有煩惱及隨煩惱皆令摧伏勤修善品乃至菩提諸不善緣心無繫念應當如是發菩提心復當修行慈悲喜捨靜住一境常思六念觀照於心應涅槃理忘想所執棄捨永除後續坐位物發勝願者猶諸菩薩修行善品廣發勝願饒益眾生我所有善亦當如是復願能除一切眾生地獄等苦圓滿福德證涅槃樂又願諸眾生多饒財寶常當勇施具足智惠常懷大忍樂作善緣得宿命智悲念有情願諸眾生所生之處常獲如是種種勝事灌頂前印相其印相者以二羽二地輪叉入掌以二水輪押交上其二火輪直竪頭相著屈二風輪在火輪背後勿令相著並直竪二空輪在二火輪第二節下其印即成此軍吒利身印以印攪水而念真言七遍或三七遍及一百八遍隨意澡浴又說別印相以觀羽空輪持地輪甲餘三輪直竪如三鈷跋折羅形是也准前用亦得此是軍荼利菩薩羯磨印加持土後加二印文其印又文云內縛二地合頭尖為杵形用刺其土三下即是也又印內縛並申合二空輪二風空在風合內二地亦申合便以印於土上右轉三遍即成結護次後至辟除印於一一時如法念誦復加念誦法要有其四種謂字數念誦時數念誦相貌念誦增加念誦念誦畢已隨所懷願及擬成就慇懃求之然後當作念誦護摩以依法故速滿心中所懷之願隨意成就假令本法不言護摩為悉地故如法作之成就之物有其二種一謂雌黃朱沙等類二心意淨隨其藥物依法受取蕳擇作淨祈求勝緣各依本法一一加持如法灌頂灑備三種緣謂明藥物並自己身備此三緣方求悉地先觀內外一一之相具精進行依真言戒為除無量不善業故依教廣修白淨之法令罪消除然誦真言乃至令得悉地成就復令增長白淨之業極令圓滿然當依法持誦真言乃至令得成就悉地如觀心者依住一境繫念專想鼻端令無散亂三昧相應持誦之人亦當如是由心繫想布在真言以此攀緣當得成就作成就者備其座具及真言白月八日十四日十五日大陰大陽虧變之日大地動日正朔一日至十五日如是等日作成就法然依本法皆須圓備先已擇得持誦勝地當於是處而作結護隨其悉地法造漫荼羅依所持明及餘等漫荼羅法置十方神如法供養辨諸供具及助伴等結護自他方入持念作成就法到發造前金剛降三世讚曰小讚也歸命金剛首摧伏諸魔者具普賢眾行無邊功德海住是本有身無始無終寂妙用施諸願調魔滅三毒改却故修行極救諸有情令超生死輪從凡入佛地請火天􅚾􅁥嗽口水枳里枳里忿怒灑淨香水燃火􅗭佛部五淨􅁥蓮花部五淨􅁥􅁥
