body:
  text: 三藏法師善無畏譯歸命諸如來及法菩薩衆蓮華金剛部并諸眷屬等我今依教說供養持誦法省略通三部次第及相應先觀神室處復明其事法對受得真言及作手印法於外出入處分土洗淨法灑掃神室處除萎華等法及淨供養器然後往澡浴先作三摩耶繫縛為障者辟除及護身光澤水等法澡浴自灌頂獻三掬水法往於神室門換衣灑身法入室便禮拜辦諸供具法數珠及神線茅環牛五淨奉獻閼伽水及置其座法復視三摩耶去身障難法辟除及去垢清淨光澤法護身及結界八方上下法初應想神座觀念本尊法隨所在方處奉請本尊法以其本真言啓請本尊已即除遣從魔奉座令坐法復視三摩耶即奉閼伽水浴尊奉衣法次獻塗香華燒香及飲食燃燈供養法真言并手印運心供養法讚歎懺悔等護尊及己身并護其處所便結大界法備具拔折羅及數珠等法充滿真言分次坐持誦法求請本所願及護所念誦回施功德法起廣大發願又奉閼伽水塗燒香等法復視三摩耶護身及己身解所結方界然後發遣法護摩支分等謂爐神及地燒祀之具法轉讀方廣經及作制底法次作慈等觀思惟六念法如是等次第我今略詮竟見神室處者謂入漫荼羅散華所墮歸依彼尊明其事法者謂得最勝受明灌頂奉阿闍梨之所印可令傳法灌頂乃至令作息災等諸餘灌頂對受真言及手印者謂受法人澡浴清淨著新潔衣於其淨處䠒跪恭敬對阿闍梨親受真言及作手印時阿闍梨先誦三遍轉授與彼彼受得已自誦三遍深生歡喜頂戴奉持此為對受隨力所辦奉施阿闍梨廣解法已方可作此念誦次第也外出入處者謂晨朝起已所往穢處皆用受觸忿怒真言而作護身真言曰唵句路拖曩上聲𤙖若其手印相以右手作拳直竪大指當護五處謂頂兩肩心及咽上分土洗淨者謂以五聚土當洗下部以三聚土洗小便處以三聚土觸洗左手以七聚土共洗兩手或恐未淨任意洗之以淨為限其三聚土以受觸真言及用手印印土持誦經一七遍然後用也次以真言而用灑身真言曰唵戍嚕二合底丁里反娑沒㗚三合底同上陀羅尼上𤙖訶誦三反之其手印相以右手仰掌直舒五指指𨄥相博次屈無名指中節與掌相當以大母指屈輔頭指根下向前其灑水法令面向東蹲踞而默然兩手置於雙膝之間手印掬水勿有泡沫無聲飲之三度飲已然後用手霑水兩度拭脣于時口中於其齒間舌觸垢穢噴喋咳嗽更復如前飲水拭脣還以此印及誦真言先觸兩目次口兩耳鼻及兩肩喉臍心咽頂上便成護身諸根清淨灑掃神室者謂隨其成就及事差別與彼相應而擇方處及意所樂無諸障難其地除去嚩弭羅蟲窠坑窟瓦礫糠骨毛髮鹹炭灰等掘去惡土填以淨土於上造室堅牢密作勿令風入門向東開或北或西隨事向南作神室已用牛糞塗以淨水灑之或以塗香即和淨水當誦此明而塗其地明曰那莽娑底𭋺也三合儞尾二合迦引難去薩􅞣囉嚩怛他去蘖哆難去三暗尾囉而尾囉而摩訶作訖羅二合嚩日哩薩多薩多娑去囉帝娑囉帝怛囉二合以怛羅以尾陀莽寧三伴若寧多囉莽底悉陀仡隸怛㘕􅁥莎訶或時忘念法則錯誤犯三摩耶每日當誦此明三七遍或一百八遍能除其過除萎華者供養尊華已先誦此明除其萎華曰唵􅁦濕尾帝摩訶􅁦濕尾帝佉娜寧􅁥莎去訶次說掃地明明曰唵賀羅賀羅囉茹㜸囉二合賀囉那也􅁥莎訶次說塗地明明曰唵羯囉引隸摩訶羯羅隸􅁥莎訶三遍誦先應灑掃神室除去萎華淨諸供器然後方去澡浴教說如是往澡浴時先以此明及手印護諸供養具然後可往明曰唵尸却囉嚩日哩暗三遍誦其手印相以右手作拳直竪大指頭指二指相著遍觸供具加持先作三摩耶者謂凡作法先作三摩耶然後作護身等一切諸事教如是說次說三摩耶真言及手印初佛部真言曰唵怛他去㜸妬娜婆二合嚩引也􅁥莎訶誦三遍其手印相仰兩手十指直向前舒並側相著微屈二頭指上節此是佛部三摩耶印次說蓮華部三摩耶真言及手印真言曰唵鉢􅇚娜謨二合娜婆二合嚩引也􅁥莎訶誦三遍之其手印相先當合掌中間兩六指向外舒散勿令相著其大指及小指兩手依舊相著合掌中虛如間敷蓮華微屈中間六指此是蓮華部三摩耶印次說金剛部三摩耶真言及手印真言曰唵嚩日路二合娜婆二合嚩引也􅁥莎訶誦三遍之其手印相右押左兩手背逆相著以右手大指差其左手小指左手大指差其右手小指中間兩手六指微令開如三股杵此是金剛三摩耶印次結縛諸難者謂以軍荼利手印真言而縛諸難其手印相左手置於右膊上以大指捻小指甲展中三指如三股杵復以右手置於左膊上亦以大指捻小指甲展中三指如三股杵面向東立屈左腳膝臨身向前就於左腳闊展右腳二尺以來橫躡地咬其右下近脣邊怒目左視默想自身如軍荼利誦其根本真言曰囊謨囉􅑈怛囊怛囉夜野囊莽室戰拏嚩日囉簸儜曳莽訶藥乞沙細囊鉢多曳囊謨嚩日囉二合句路二合馱野引能瑟吒路二合得羯二合吒婆也珮囉嚩引野阿徙母薩羅鉢囉戍跛捨訶娑多二合野怛姪他唵暗沒㗚多軍拏里佉佉佉佉却醯却引醯底瑟咤底瑟咤滿馱滿馱訶囊訶囊蘖􅗭囉惹二合蘖􅗭囉惹二合微娑鋪吒野微娑鋪吒野薩囉􅞣嚩二合尾􅍕近囊二合微近􅍕囊野劍摩訶伽儜鉢底餌尾旦多迦囉野𤙖泮吒誦七遍之此真言後置滿馱滿馱句即以兩手三指便收作拳把相捻指餘並依舊其諸難者便成結縛次澡浴法者為淨身故先取淨土分作三聚以真言手印各持誦之真言曰三玄妙印在之唵寧佉囊嚩蘇提􅁥莎訶五遍誦之此是淨土真言其手印相兩手相叉指捻手背雙竪二頭指相著二大母指並竪博頭指側以此手印觸所取土誦真言五遍然後取之次辟除者凡所作諸事先須辟除然後方作一切諸事教說如是辟除真言曰囊謨嚩日囉也𤙖賀囊鈍囊莽他尾跢崩娑瑜瑳囉也𤙖泮吒誦七遍之此是辟除真言其手印相以左手大指屈入掌中以中指無名指而押大指屈其頭指著中指中節側亦屈小指著無名指中節側即舒努臂頭上右轉三遍及印身五處右手大指押小指甲餘三指直竪作嚩日囉形叉其腰側立法如前此是辟除印又辟除真言及手印真言曰唵嚩日囉多囉𤙖泮吒是辟除真言其手印相以右手拍左手掌如是三遍是辟除手印又辟除真言及手印真言曰唵枳里枳羅囉嚩咾捺囉𤙖泮吒辟除真言其手印相以右手彈三遍是辟除手印次護身法者以此真言及手印用結十方界及以護身真言曰唵商迦𭋺三莽焰􅁥莎訶是護身結界真言其手印相以右手大指捻小指甲上餘三指微開直竪名嚩日囉印用結上下及八方界并用護身次以真言手印用印自身以水土澡豆等物便成去垢及與清淨真言曰唵枳里枳里嚩日囉𤙖泮吒七遍誦之去垢真言其手印相以右手大指捻小指甲上餘三指微開直竪叉腰間三指向前左手亦作此印用觸諸物即成去垢及與清淨此是去垢手印次以軍荼利真言及手印用作清淨真言曰唵暗沒㗚帝𤙖泮吒其手印相以右手作拳取水念誦七遍用灑諸物及身頂上便成清淨此是作清淨印其拳四指勿令著掌次以真言及手印用作光澤真言曰唵入嚩攞入嚩攞也縛納哩􅁥莎縛訶誦三遍之是光澤真言其手印相以左手大指捻小指甲上餘三指微開直竪舒其肘還以右手作此印承左手肘下以左手印印觸諸物及以己身即成光澤是光澤印次以真言及手印用攪其水真言曰唵𤙖賀囊嚩日哩二合嚩日𭋺二合拏訶攪水真言其手印相兩手向外相叉屈著手背以二大指屈在掌中二頭指稍屈頭甲相著是攪水印次以真言及手印取土塗身真言曰唵部􅿣囉若三合嚩𤙖誦七遍之是塗身真言其手印相取土和水兩手大指各押小指甲上餘指散開更互相揩以右手遍塗身上是塗土洗身印次以軍荼利真言手印持誦水真言曰唵暗沒㗚帝𤙖泮吒誦七遍之其手印相先平舒右手先屈中指無名指押大指甲上稍屈頭指及小指在中指無名指側持誦真言以印攪水澡浴印誦水印次以真言及手印遣除身中毗那夜迦難真言曰唵暗沒㗚二合帝賀囊賀囊𤙖泮吒除身中毗那夜迦其手印相以兩手大指屈入掌中各各作拳舒二頭指左右相叉入虎口中以印從頂向下至足而略去此是遣除身中毗那夜迦印次則應以軍荼利真言及手印護身五處真言曰唵嚩日囉祇寧鉢囉儞鉢多也􅁥莎訶護身真言其手印相以二小指相叉入掌中二無名指雙押二小指竪二中指頭側相跓二頭指微屈在中指上節側相去一大麥許直竪二大指在中指側印觸五處即成護身是護身印次以真言及手印持誦一一分土真言曰唵度比度比迦也度比鉢囉餌嚩二里寧􅁥莎訶三遍誦真言其手印相以二手頭指及小指令頭相跓以二中指二無名指屈入掌中其二手相背不令相著以二大指頭側相著前所置三聚土取一分以印印土持誦三遍用洗從足至臍即洗其手用水灑淨第二第三亦如是洗及以灑淨又取一聚如前持誦用洗從臍至頸又取一聚如前持誦用洗從頸至頂畢已還誦真言及作手印隨意澡洗還作此印亦誦真言並其手印遍轉於身當心身後解印是名被甲印此是誦土印次誦軍荼利根本真言以手攪水隨意澡浴真言曰囊謨囉􅑈怛囊怛囉夜也那莽室戰拏嚩日囉簸儜曳摩訶藥乞沙細囊鉢多曳那謨嚩日囉句路駝也鉢囉若嚩里多儞鉢多能瑟吒嚕得迦吒婆也珮囉嚩也阿徙母娑囉嚩日囉二合鉢囉輸波捨賀娑多也怛姪也他唵暗沒㗚多軍拏里佉佉佉佉佉囊佉囊佉囊佉囊佉陀佉陀佉陀佉陀佉呬佉呬佉呬佉呬底瑟吒底瑟咤賀囊賀囊娜賀娜賀鉢者鉢者蘖㗚訶拏蘖㗚訶拏二合滿馱滿馱蘖􅗭囉若蘖􅗭㗚惹怛囉若怛囉若微娑鋪吒也微婆鋪吒也婆伽梵囊沒㗚多軍拏里母㗚馱喃多拏也嚩日𭋺拏薩􅞣囉嚩微􅍕伽那也微那也劍寧嚩羅也摩訶伽儜鉢底餌尾難多迦囉也𤙖𤙖泮吒泮吒句嚕馱􅍉根囊曳􅁥莎訶誦三遍其自灌頂者以此真言及手印而自灌頂真言曰唵賀二合佉里里𤙖泮吒誦三遍是灌頂真言其手印相二小指相叉入掌中二無名指雙押二小指叉上直竪二中指頭側令相跓以二頭指在頭指側以印取水持誦真言三遍而自灌頂此是灌頂印次以真言及手印而自結髮真言曰唵蘇悉地羯哩􅁥莎縛訶三誦三遍通三部用其手印相右手作拳直舒大指以頭指押大指頭上令使縛圓曲作此手印持誦真言三遍已置於頂上即成結髮印佛部結髮真言曰唵尸祇尸契􅁥莎縛訶三誦三遍蓮華部結髮真言曰唵尸契􅁥莎縛訶三誦三遍金剛部結髮真言曰唵尸佉寫􅁥莎縛訶三誦三遍凡洗浴時不應就於淤泥水中或水有㓨或峻岸水或狹渠淺水旋渦忽是流多蟲渾水溉灌田水及坑中水如是之水並勿洗浴又復不應於其水中及以水側大小便利不得於水中跳走忽行浮沒等戲正在水中勿視隱處亦不思想婦人隱處及與嬭腰諸餘支分應當寂靜默然洗浴但令去垢勿為嚴身之想次獻三掬水者洗浴了已面向本尊所居之方觀念本尊持誦真言及作手印以印掬水而獻三掬想浴本尊及奉閼伽或於水中隨意念誦方詣道場佛部獻水真言曰唵帝囉𭋺佛哺特反陀􅁥莎嚩訶三誦三遍奉三掬水蓮華部獻水真言曰唵避哩避哩𤙖泮吒三誦三遍奉三掬水金剛部獻水真言曰唵微濕嚩二合嚩日𭋺二合􅁥莎嚩訶誦三遍奉掬水其手印相平仰兩手側相著以二頭指捻二大指頭六指微屈以印掬水持誦真言三度奉浴本尊此通三部奉三掬水印奉獻已訖澡浴又畢所詰諸印應須解之以阿三忙祇寧真言手印左轉即成解結真言曰唵阿三忙祇寧訖𠼝引咽聲吽泮吒此是解界真言其手印相以右手背置左掌內令無縫𨄥二大指向上直竪左轉一遍解所結印往於道場者謂入向道場之時勿起瞋恚及與貪欲專念本尊而往去之於神室中不應踏過種種器仗及諸藥草謂種種器騎乘鈴鐸及諸印具萎華藥味一切草木皆不應踏制底尊像比丘等影皆不應踏亦勿乘騎象馬駱駝牛羊驢等及一切諸乘皆不應乘及身手觸若犯此等墮三麼耶亦不應起貪瞋癡慢掉舉憍等當著木履而往道場中遇制底尊容師長當脫木履便申致敬方至道場灑身換衣者謂至道場門外而立洗手及足用前所說真言手印重更飲水並灑淨之佛部飲水灑淨真言曰唵摩訶去入嚩二合囉𤙖蓮華部飲水灑淨真言曰唵覩覩羅俱嚕俱嚕􅁥莎嚩訶金剛部飲水灑淨真言曰唵入嚩哩多嚩日哩尼𤙖說佛部飲水灑淨手印仰舒右手屈無名指中節向內勿著掌次說蓮華部飲水灑淨手印仰舒右手屈無名指中節及小指向內勿令著掌說金剛部飲水灑淨手印仰舒右手屈無名指向內勿令著掌散開頭指小指次以真言手印灑淨門外所換之衣真言曰唵微莽囉􅁥莎嚩訶是灑衣真言其手印相以右手作拳取水持誦用灑淨衣次以真言持誦其衣而著真言曰唵鉢哩嚩􅚰囉多嚩日哩尼𤙖著衣真言入室便禮者如教所說行者一心當入道場既入室已面向於尊合掌作禮先於室內當置尊容幀或制底或但置座入便禮已而供養之次辦供養具者謂塗香等五種牛淨神線茅環己身之座及閼伽器金剛數珠白芥子繫腰線等是名供具先當辦之入室之時口誦真言而入足真言曰唵入嚩二合哩多二合路者囊𤙖泮吒誦七遍是入室真言通三部用次即應作三摩耶真言及印初佛部真言曰唵怛他蘖妬挪婆二合嚩也莎訶誦五遍其手印相仰兩手十指直向前舒並側相著微屈二頭指上節是佛部三麼耶手印次說蓮華部三摩耶真言及手印真言曰唵鉢那謨挪婆嚩也􅁥莎嚩訶誦五遍其手印相先當合掌中間兩手六指向外舒散勿令相著其二大指及二小指依舊相著令掌中虛如開蓮華微屈中間六指是蓮華部三摩耶印次說金剛部三麼耶真言及手印真言曰唵嚩日𡀔挪婆嚩也􅁥莎嚩訶五遍其手印相右押左兩手背逆相著以右手大指叉其左手小指左手大指叉其右手小指中間兩手六指微開如三股杵是金剛部三麼耶手印次應以真言及手印遣除身中毗那夜迦難真言曰唵暗沒㗚二合帝賀囊賀囊𤙖泮吒其手印相以兩手大指屈入掌中以中指已下押作拳舒二頭指左右相叉入虎口中以印從頂向下至足而略去之是遣除身中毗那夜迦等難印次應以真言及手印辟除真言曰那謨嚩日囉也𤙖賀囊度囊莽他尾特夢娑瑜瑳囉也泮吒誦七遍其手印相以左手大指屈入掌中以中指無名指而押大指屈其頭指著中指中節側亦屈小指著無名指中節側即舒怒臂頭上右轉三遍及印觸身五處右手大指甲餘三指直竪作拔折囉形叉其腰側立法如前是辟除印又辟除真言及手印真言曰唵嚩日囉多囉𤙖泮吒誦三遍其手印相以右手拍左手掌如是三遍是辟除印又辟除真言及手印真言曰唵枳哩枳哩囉嚩咾捺囉二合𤙖泮吒其手印相以右手彈指三遍是辟除印云何名為辟除謂於道場華香等衣裳及座等諸物所有諸難擯逐令去名辟除也即得清淨次以真言及手印而作去垢真言曰唵枳哩枳哩嚩日囉𤙖泮吒誦七遍其手印相以右手大指捻小指甲上餘三指微開直竪叉腰三指向前左手亦作用此印用印諸物令除穢惡名曰去垢印枳里枳里此忿怒聲次作清淨以部心真言作拳取水持誦七遍用灑諸物便成清淨初佛部心真言曰唵爾囊上爾迦輕呼次蓮華部心真言曰唵阿𡀔力迦輕呼次金剛部心真言曰唵嚩日囉二合特勒迦次作光澤持誦真言及作手印以印諸物便成光澤初佛部光澤真言曰唵帝誓帝若徙尾寧徙提娑馱也𤙖泮吒誦三遍蓮華部光澤真言曰唵儞比也儞卑也二合儞跛也摩訶室哩曳􅁥莎訶誦三遍金剛部光澤真言曰唵入嚩羅入嚩羅也滿度哩莎訶誦三遍其手印相以左手大指捻小指甲上餘三指微開直竪舒其肘還以右手亦作此印承左手肘下以左手印印觸諸物即成光澤此通三部用次作護身結明王手印誦此真言印頂等五處便成堅固護身真言曰唵嚩日囉􅍋祇寧鉢囉儞去鉢多也􅁥莎訶誦三遍其手印相二小指叉入掌二無名指雙押二小指叉上竪二中指側令相跓二頭指微屈在中指上節側相去一大麥許直竪二大指在中指側印觸五處即成護身是護身印次作大護身誦此真言及作手印亦印五處成大護身真言曰唵入嚩囉囊也𤙖泮吒誦五遍其手印相即前護身印同次應被甲誦真言及作手印從頂摩觸下至於足即成被甲真言曰唵度比度比迦也度比鉢囉入嚩里寧􅁥莎訶誦七遍其手印相散舒內手十指此是被甲印次以真言及手印而用結髮真言曰唵蘇悉地羯里􅁥莎嚩訶通三部用之其手印相右手作拳直舒大指印於頂上此是結髮印通三部用又佛部結髮真言曰那莽娑怛𭋺也地尾迦難薩囉􅞣嚩怛他蘖多難唵悉馱路者寧􅁥莎訶誦七遍蓮華部結髮真言曰那謨囉􅑈怛囊怛囉夜也那莽鉢那莽簸儜曳唵迦𪘨􅁥莎訶七遍金剛部結髮真言曰囊謨囉􅑈怛囊怛囉夜也囊莾室戰拏嚩日囉簸儜曳摩訶藥乞沙細囊鉢多曳囊莽迦羅訖㗚難多𡀔比尼商迦㘑扇底迦哩伽吒儞加吒儜簸多也􅁥沙訶誦七遍其手印相與前結髮印同次置其寶座者本尊隨在方所先顧彼方次應心想大海中寶山其山頂上想寶師子座於其上復觀諸寶樓閣懸以繒幡上有寶繖覆矜羯尼網而以莊嚴運心想已後誦真言能令加被前所想者一一成就即次成就大海真言曰四玄當知唵毗莽嚕娜地𤙖誦三遍次說成就寶山真言曰唵阿者羅𤙖誦三遍次說成就寶師子座真言曰唵阿者羅微𭋺􅁥莎訶誦三遍次說成就寶蓮華真言曰唵迦莽羅􅁥莎訶誦三遍其手印相合掌兩手叉其十指以右押左是辨諸莊嚴等印次說成就寶樓閣等種種莊嚴真言曰唵囊莽薩􅞣囉嚩怛他蘖多南唵薩􅞣羅嚩他缺嗚跢蘖帝娑破囉呬莽暗伽伽囊劍􅁥莎訶誦七遍印同如前辨諸事印次奉獻閼伽水者隨部差別及事成就相應而作其器所謂金銀熟銅石木及瓦商佉與螺樹葉等作勿令破缺麁澀孔穴盛滿香水隨其部類而置諸華以辦事真言持誦復以部母真言持誦即以閼伽器持誦置於左邊辦事真言及手印前所說辟除等真言手印是也次說三部母等真言及手印者初說佛部母真言曰囊謨婆伽嚩妬塢瑟膩沙也唵嚕嚕娑普嚕若嚩羅底瑟咤悉馱路者寧薩􅞣囉嚩􅚼剌他娑馱寧􅁥莎嚩訶是佛部母真言佛眼是蓮華部母真言曰那囉舍二合囊裟鉢㗚三合􅖱囉舍二合囊便演二合嚩室囉二合嚩􅋌娑莽二合囉嬭囊者瀉莽含薩􅞣囉嚩二合薩怛嚩二合難薩􅞣囉嚩二合微也二合地指枳瑳迦唵迦𪘨微迦𪘨迦吒微迦吒迦楨迦𪘨婆伽嚩底微若而也反曳􅁥莎訶誦三遍半拏囉嚩私寧是也金剛部母真言曰那謨羅􅑈怛囊二合怛囉二合夜也那莽室戰拏嚩日囉簸儜曳莽訶去藥乞沙二合細囊鉢多曳唵俱蘭達哩滿馱滿馱吽泮吒誦三遍忙莽雞是次說部心真言初佛部心真言曰唵爾囊爾迦誦七遍蓮華部心真言曰唵阿去𡀔力迦誦七遍金剛部心真言曰唵嚩日囉二合特嘞二合迦誦七遍之次說佛部母佛眼手印相合兩手屈二大指入掌中微屈頭指押中指上節背是佛根手印次說蓮華部母半拏羅嚩私寧手印相合掌十指並屈頭相著令掌中虛如未開蓮華仍腕相著次說金剛部母忙莽計手印相合掌屈二頭指及二無名指入掌中背各相著餘六指並直竪相著次說佛部心手印相初佛部心手印相八指相叉入掌中令八指中節露出其二大指並直竪勿著頭指次說蓮華部心印相依佛部心印唯改左大指屈入掌中獨竪右大指次說金剛部心印相依佛部心印唯改右大指屈入掌中獨竪左大指次其閼伽法隨部相應及事成就如教廣說奉獻之時以本真言持誦而獻次奉請本尊者持誦行者隨作法處先想座已次以真言手印成就車輅送本尊所車輅真言曰唵覩嚕覩嚕𤙖此真言通三部送其手印相二手中指以下六指相叉入掌竪二頭指令頭相跓二大指輔頭指側開兩掌不令腕相著六指互相著掌此手印通三部奉送車輅奉送車輅已即應誦以此明中安來句及作手印或但獨請本尊或并眷屬召請明曰那莽娑怛𭋺也地尾迦難薩􅞣囉嚩怛他蘖多難唵嚩日㘕祇儞也羯􅞻囉灑此中安來句也􅁥莎訶其手印依前車輅印唯改右大指與左手中指頭相著此手印通三部奉請印或以部心真言中置來句及作手印而請若以部心真言奉請本尊歎喜速來初佛部心真言曰唵爾囊邇迦誦二十五遍其手印相依前部心印唯以二大指向前招三遍即成請印佛部請印蓮華部心真言曰唵阿路力迦誦二十五遍其手印相依前部心印唯以右大指向前招三遍即成請印是蓮華部請印金剛部心真言曰唵嚩日囉二合特嘞二合迦誦二十五遍其手印相依前部心印改左大指向前招三遍即成請印金剛部請印欲奉請時先執香爐誦真言淨治空中道路然後奉請淨治真言曰唵蘇悉地迦哩入嚩二合里多喃多慕囉多二合曳入嚩二合囉入嚩二合囉滿馱滿馱賀囊賀囊𤙖泮吒金剛部淨治路真言通三部用佛部淨治路真言曰唵入嚩二合囉虎𤙖蓮華部淨治路真言曰唵鉢那咩二合寧上婆上伽輕嚩底慕賀也慕輕去賀也若蘖二合􅝥慕賀寧上􅁥莎訶作此法已空中關鑰悉皆開解亦成辟除乃至清淨及成警覺本尊先作奉請手印即誦此句一遍次即應誦奉請真言其句曰曀醯曳呬婆伽梵寧賀薄底夜二合囊三莽曳囊者閼囉健者三鉢羅底誓南布若二合遮捺儞也鉢囉二合四去娜咩通三部奉請句真言前已說訖隨其本尊坐立忿怒及其歡喜等相乃至顧視行者作彼形狀相貌相應而奉請尊天喜三年九月七日書了僧平源之本
